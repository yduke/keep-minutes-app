name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  # ─── 第一步：检查版本是否真的变化，避免无关改动触发发布 ───
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          PREV=$(git show HEAD~1:package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "0.0.0")
          CURR=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "Previous version: $PREV"
          echo "Current version:  $CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "version=$CURR" >> $GITHUB_OUTPUT
          else
            echo "changed=false"  >> $GITHUB_OUTPUT
            echo "version=$CURR"  >> $GITHUB_OUTPUT
          fi

  # ─── 第二步：创建 Git Tag 和 GitHub Release（草稿）───
  create-release:
    name: Create GitHub Release
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          release_name: v${{ needs.check-version.outputs.version }}
          draft: true          # 等两个平台都上传完再手动/自动发布
          prerelease: false

  # ─── 第三步：先打包 macOS ───
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish macOS DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 如需 Apple 公证，在 Secrets 中添加以下变量并取消注释：
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --mac --publish always

      - name: Upload macOS artifact (备份)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          retention-days: 7

  # ─── 第四步：macOS 完成后再打包 Windows（串行） ───
  build-windows:
    name: Build Windows
    needs: build-macos        # ← 串行关键：等 macOS 完成
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish Windows NSIS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --win --publish always

      - name: Upload Windows artifact (备份)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist/*.exe
          retention-days: 7

  # ─── 第五步：两个平台都完成后，将草稿 Release 正式发布 ───
  publish-release:
    name: Publish Release
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Draft Release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const draft = releases.data.find(r => r.draft && r.tag_name === `v${{ needs.check-version.outputs.version }}`);
            if (!draft) { core.setFailed('Draft release not found'); return; }
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: draft.id,
              draft:      false,
            });
            console.log(`✅ Release v${{ needs.check-version.outputs.version }} published!`);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}